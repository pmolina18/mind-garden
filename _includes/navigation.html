<nav class="site-nav" aria-label="Main navigation">
  <ul class="nav-links" role="list">
    {% for link in site.navigation %}
      {% assign link_url = link.url | relative_url %}
      {% if page.url == link.url %}
        <li><a href="{{ link_url }}" class="active" aria-current="page">{{ link.title }}</a></li>
      {% else %}
        <li><a href="{{ link_url }}">{{ link.title }}</a></li>
      {% endif %}
    {% endfor %}
    <li class="nav-rss"><a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS Feed">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M4 11a9 9 0 0 1 9 9"/>
        <path d="M4 4a16 16 0 0 1 16 16"/>
        <circle cx="5" cy="19" r="1"/>
      </svg>
    </a></li>
  </ul>
</nav>
